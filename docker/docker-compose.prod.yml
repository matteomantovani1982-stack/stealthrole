# docker/docker-compose.prod.yml
#
# CVLab — Full production stack (self-contained)
#
# Usage:
#   cp .env.example .env.production  # fill in all values
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d
#
# First deploy only (run migrations):
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production run --rm migrator
#
# Update (rolling):
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d --no-deps api

x-app-env: &app-env
  APP_ENV: production
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  SECRET_KEY: ${SECRET_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-6}
  SERPER_API_KEY: ${SERPER_API_KEY}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  S3_BUCKET_NAME: ${S3_BUCKET_NAME:-cvlab-production}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
  SMTP_HOST: ${SMTP_HOST}
  SMTP_USER: ${SMTP_USER}
  SMTP_PASSWORD: ${SMTP_PASSWORD}
  SMTP_FROM: ${SMTP_FROM:-noreply@cvlab.co}
  APP_BASE_URL: ${APP_BASE_URL:-https://cvlab.co}
  FRONTEND_URL: ${FRONTEND_URL:-https://cvlab.co}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://stealthrole.com,https://www.stealthrole.com,https://www.linkedin.com}
  SENTRY_DSN: ${SENTRY_DSN}
  SENTRY_ENVIRONMENT: production
  DEBUG: "false"

x-api-build: &api-build
  context: ..
  dockerfile: docker/Dockerfile

x-worker-build: &worker-build
  context: ..
  dockerfile: docker/Dockerfile.worker

x-worker-base: &worker-base
  build: *worker-build
  environment:
    <<: *app-env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  migrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrator
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build: *api-build
    environment:
      <<: *app-env
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M

  worker_default:
    <<: *worker-base
    command: celery -A app.workers.celery_app.celery worker -Q default --concurrency=4 --loglevel=info
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  worker_llm:
    <<: *worker-base
    command: celery -A app.workers.celery_app.celery worker -Q llm --concurrency=2 --loglevel=info
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  worker_rendering:
    <<: *worker-base
    command: celery -A app.workers.celery_app.celery worker -Q rendering --concurrency=4 --loglevel=info
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "2.0"
        reservations:
          memory: 512M

  beat:
    <<: *worker-base
    command: celery -A app.workers.celery_app.celery beat --loglevel=info
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cvlab
      POSTGRES_USER: cvlab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvlab -d cvlab"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 1G

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "1.0"
        reservations:
          memory: 128M

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/cvlab.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - frontend_dist:/usr/share/nginx/html:ro
    restart: unless-stopped
    depends_on:
      - api

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_data:
    name: cvlab_postgres_data
  redis_data:
    name: cvlab_redis_data
  certbot_www:
  certbot_conf:
  frontend_dist:
