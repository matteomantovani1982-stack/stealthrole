# docker/nginx/cvlab.conf
# CVLab virtual host — handles API proxy + frontend SPA + SSL

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name cvlab.co www.cvlab.co;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server block
server {
    listen 443 ssl http2;
    server_name cvlab.co www.cvlab.co;

    # SSL certs (issued by certbot)
    ssl_certificate     /etc/letsencrypt/live/cvlab.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cvlab.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── API proxy ──────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeouts — LLM tasks can take up to 3 minutes
        proxy_read_timeout    300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;

        # Don't buffer large responses (streaming)
        proxy_buffering off;
    }

    # Health check — no HTTPS redirect so load balancer can reach it
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # Stripe webhook — pass raw body (signature verification needs it)
    location /api/v1/billing/webhook {
        proxy_pass         http://api:8000/api/v1/billing/webhook;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Frontend SPA ───────────────────────────────────────────────────────
    # Serve React app — all non-API routes return index.html
    location / {
        root  /usr/share/nginx/html;
        index index.html;

        # Cache static assets aggressively (Vite uses content-hash filenames)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # index.html — never cache (always fetch latest)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # SPA fallback — React Router handles routing client-side
        try_files $uri $uri/ /index.html;
    }
}
