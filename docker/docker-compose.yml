# docker/docker-compose.yml
#
# CareerOS — full local development stack
#
# Services:
#   migrator        — runs alembic upgrade head, exits
#   api             — FastAPI server (hot reload)
#   worker_default  — Celery: CV parsing, general tasks
#   worker_llm      — Celery: LLM calls (Claude API) — rate-limited, concurrency=2
#   worker_rendering — Celery: DOCX rendering + S3 upload
#   beat            — Celery periodic task scheduler
#   postgres        — PostgreSQL 16
#   redis           — Redis 7 (broker + result backend)
#   minio           — S3-compatible local object storage
#   minio_init      — creates 'careeros' bucket on first run
#   flower          — Celery task monitor UI (localhost:5555)
#
# Usage:
#   cp .env.example .env        # fill in your API keys
#   docker compose -f docker/docker-compose.yml up
#
# To rebuild after code changes:
#   docker compose -f docker/docker-compose.yml up --build
#
# To run migrations only:
#   docker compose -f docker/docker-compose.yml run --rm migrator

x-app-env: &app-env
  APP_ENV: development
  DEMO_MODE: ${DEMO_MODE:-true}
  DATABASE_URL: postgresql+asyncpg://careeros:careeros@postgres:5432/careeros
  DATABASE_POOL_SIZE: 2
  DATABASE_MAX_OVERFLOW: 1
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY_ID: minioadmin
  S3_SECRET_ACCESS_KEY: minioadmin
  S3_BUCKET_NAME: careeros
  S3_REGION: us-east-1

x-app-build: &app-build
  context: ..
  dockerfile: docker/Dockerfile

x-worker-build: &worker-build
  context: ..
  dockerfile: docker/Dockerfile.worker

x-worker-base: &worker-base
  build: *worker-build
  env_file: ../.env
  environment:
    <<: *app-env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped


services:

  # ── Database migrations (runs once, then exits) ───────────────────────────
  migrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrator
    container_name: careeros_migrator
    env_file: ../.env
    environment:
      <<: *app-env
      # Migrator only needs DB access — these placeholders satisfy pydantic validation
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-placeholder}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-placeholder}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-placeholder}
      SECRET_KEY: ${SECRET_KEY:-migration-only-secret-key-placeholder-32c}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API Server ────────────────────────────────────────────────────────────
  api:
    build: *app-build
    container_name: careeros_api
    ports:
      - "8000:8000"
    volumes:
      - ../:/app   # Live code reload in development
    env_file: ../.env
    environment:
      <<: *app-env
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir /app/app
      --log-level info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  # ── Celery: Default queue (CV parsing, general) ───────────────────────────
  worker_default:
    <<: *worker-base
    container_name: careeros_worker_default
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=info
      --concurrency=4
      --queues=default
      --hostname=worker-default@%h

  # ── Celery: LLM queue (Claude API calls — rate-limited) ───────────────────
  # Concurrency=2: two simultaneous LLM calls max.
  # This maps to Claude API rate limits — increase with care.
  worker_llm:
    <<: *worker-base
    container_name: careeros_worker_llm
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=info
      --concurrency=2
      --queues=llm
      --hostname=worker-llm@%h

  # ── Celery: Rendering queue (DOCX render + S3 upload) ────────────────────
  worker_rendering:
    <<: *worker-base
    container_name: careeros_worker_rendering
    command: >
      celery -A app.workers.celery_app.celery worker
      --loglevel=info
      --concurrency=4
      --queues=rendering
      --hostname=worker-rendering@%h

  # ── Celery Beat (periodic task scheduler) ────────────────────────────────
  beat:
    <<: *worker-base
    container_name: careeros_beat
    command: >
      celery -A app.workers.celery_app.celery beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler

  # ── Flower (Celery task monitor) ─────────────────────────────────────────
  flower:
    <<: *worker-base
    container_name: careeros_flower
    ports:
      - "5555:5555"
    command: >
      celery -A app.workers.celery_app.celery flower
      --port=5555
      --basic_auth=admin:careeros
    depends_on:
      - redis

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: careeros_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: careeros
      POSTGRES_PASSWORD: careeros
      POSTGRES_DB: careeros
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U careeros -d careeros"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: careeros_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── MinIO (local S3) ──────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: careeros_minio
    ports:
      - "9000:9000"      # S3 API endpoint
      - "9001:9001"      # MinIO web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── MinIO bucket initialiser (runs once) ──────────────────────────────────
  minio_init:
    image: minio/mc:latest
    container_name: careeros_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/careeros &&
      mc anonymous set download local/careeros/outputs &&
      echo 'MinIO ready: bucket careeros created.'
      "
    restart: "no"


volumes:
  postgres_data:
  redis_data:
  minio_data:
