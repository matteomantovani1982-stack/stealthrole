<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #e5e7eb;
      background: #0b0f2a;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }
    .logo span { color: #7F8CFF; }
    .version { font-size: 10px; color: rgba(255,255,255,0.3); }
    .content { padding: 16px; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: #22C55E; box-shadow: 0 0 6px #22C55E66; }
    .dot-red { background: #EF4444; box-shadow: 0 0 6px #EF444466; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-box {
      padding: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
    }
    .stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }
    .stat-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      text-align: center;
      transition: all 0.15s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #5B6CFF 0%, #7F8CFF 100%);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }
    .btn-danger {
      background: none;
      color: #EF4444;
      font-size: 11px;
      font-weight: 500;
      padding: 6px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: #fff;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
    }
    input:focus { border-color: #7F8CFF; }
    input::placeholder { color: rgba(255,255,255,0.3); }

    .error {
      color: #EF4444;
      font-size: 11px;
      padding: 8px 10px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .info {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      margin-top: 8px;
    }

    .progress-wrap {
      display: none;
      padding: 10px 12px;
      background: rgba(127,140,255,0.06);
      border: 1px solid rgba(127,140,255,0.2);
      border-radius: 8px;
      margin-bottom: 10px;
    }
    .progress-wrap.active { display: block; }
    .progress-text {
      font-size: 11px;
      color: #C7D0FF;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }
    .progress-bar {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #5B6CFF, #7F8CFF);
      width: 0%;
      transition: width 0.3s ease;
    }
    .progress-indet .progress-fill {
      width: 40% !important;
      animation: indet 1.4s ease-in-out infinite;
    }
    @keyframes indet {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(250%); }
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 12px 0;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: rgba(255,255,255,0.4);
    }
    .footer a {
      color: #7F8CFF;
      text-decoration: none;
      font-weight: 500;
    }
    .footer a:hover { text-decoration: underline; }

    #login-view, #main-view { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Stealth<span>Role</span></div>
    <div class="version">v1.0.0</div>
  </div>

  <!-- Login View -->
  <div id="login-view" class="content">
    <div id="login-error" class="error" style="display:none"></div>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn btn-primary" id="login-btn">Sign in</button>
    <div class="info">Or sign in on stealthrole.com — the extension will pick up your session automatically</div>
  </div>

  <!-- Main View -->
  <div id="main-view" class="content">
    <div class="status" id="status-bar">
      <div class="status-dot dot-green"></div>
      <span id="user-email">Connected</span>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">Connections</div>
        <div class="stat-value" id="stat-connections">—</div>
        <div class="stat-sub" id="stat-connections-sub">Never synced</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Messages</div>
        <div class="stat-value" id="stat-messages">—</div>
        <div class="stat-sub">Coming soon</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Intro paths</div>
        <div class="stat-value" id="stat-paths">—</div>
        <div class="stat-sub">Coming soon</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Applications</div>
        <div class="stat-value" id="stat-apps">—</div>
        <div class="stat-sub">In pipeline</div>
      </div>
    </div>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-text">
        <span id="progress-label">Scanning connections…</span>
        <span id="progress-count">0</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <button class="btn btn-primary" id="btn-sync-connections">🔄 Sync LinkedIn connections</button>
    <button class="btn btn-secondary" id="btn-save-job">💼 Save this job</button>
    <button class="btn btn-secondary" id="btn-autofill">⚡ Auto-fill application</button>

    <div class="divider"></div>

    <button class="btn btn-danger" id="btn-logout">Sign out</button>
  </div>

  <div class="footer">
    <a href="https://stealthrole.com" target="_blank">Open StealthRole →</a>
    <span>v1.0.0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
