[alembic]
# Path to migration scripts
script_location = app/db/migrations
version_locations = app/db/migrations/versions

# Template for migration file names: timestamp_description.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for generated timestamps
timezone = UTC

# Max length of slug in migration filename
truncate_slug_length = 40

# Don't prepend module name to migration revision IDs
prepend_sys_path = .

# SQLAlchemy URL — overridden by env.py at runtime to use async driver
sqlalchemy.url = postgresql+asyncpg://careeros:careeros@localhost:5432/careeros

[post_write_hooks]
# Automatically format migration files with ruff
hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/.venv/bin/ruff
ruff.options = --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
